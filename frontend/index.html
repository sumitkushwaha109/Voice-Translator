<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Voice Translator</title>

    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Poppins", sans-serif;
      }

      body {
        background: #0f172a;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        color: #e2e8f0;
      }

      .container {
        background: rgba(30, 41, 59, 0.8);
        backdrop-filter: blur(20px);
        padding: 30px;
        width: 420px;
        border-radius: 20px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6);
        text-align: center;
        border: 1px solid rgba(255, 255, 255, 0.1);
      }

      h2 {
        margin-bottom: 15px;
      }

      /* Mic */
      .mic {
        width: 70px;
        height: 70px;
        margin: 10px auto;
        border-radius: 50%;
        background: radial-gradient(circle, #22c55e, #16a34a);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 28px;
        cursor: pointer;
        box-shadow: 0 0 20px rgba(34, 197, 94, 0.6);
        transition: 0.3s;
      }

      .mic.recording {
        animation: glow 1s infinite alternate;
      }

      @keyframes glow {
        from {
          box-shadow: 0 0 10px #22c55e;
        }
        to {
          box-shadow: 0 0 30px #22c55e;
        }
      }

      /* Wave bars */
      .wave {
        display: flex;
        justify-content: center;
        gap: 4px;
        margin-top: 10px;
        height: 20px;
      }

      .bar {
        width: 4px;
        height: 10px;
        background: #22c55e;
        animation: wave 1s infinite ease-in-out;
      }

      .bar:nth-child(2) {
        animation-delay: 0.1s;
      }
      .bar:nth-child(3) {
        animation-delay: 0.2s;
      }
      .bar:nth-child(4) {
        animation-delay: 0.3s;
      }
      .bar:nth-child(5) {
        animation-delay: 0.4s;
      }

      @keyframes wave {
        0%,
        100% {
          height: 8px;
        }
        50% {
          height: 20px;
        }
      }

      .dropdowns {
        display: flex;
        gap: 10px;
        margin-top: 15px;
      }

      select {
        flex: 1;
        padding: 10px;
        border-radius: 10px;
        border: 1px solid rgba(255, 255, 255, 0.2);
        background: #1e293b;
        color: white;
      }

      .swap {
        background: #6366f1;
        border-radius: 50%;
        width: 40px;
        height: 40px;
        border: none;
        color: white;
        cursor: pointer;
      }

      .output-box {
        margin-top: 20px;
        padding: 15px;
        background: rgba(15, 23, 42, 0.6);
        border-radius: 10px;
        text-align: left;
      }

      audio {
        width: 100%;
        margin-top: 10px;
        filter: invert(1);
      }

      .status {
        font-size: 12px;
        margin-top: 10px;
        color: #94a3b8;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h2>🎙 Voice Translator</h2>

      <div class="mic" id="mic" onclick="toggleRecording()">🎤</div>

      <div class="wave" id="wave" style="display: none">
        <div class="bar"></div>
        <div class="bar"></div>
        <div class="bar"></div>
        <div class="bar"></div>
        <div class="bar"></div>
      </div>

      <div class="dropdowns">
        <select id="inputLang">
          <option value="en">English</option>
          <option value="hi">Hindi</option>
        </select>

        <button class="swap" onclick="swapLang()">⇄</button>

        <select id="outputLang">
          <option value="hi">Hindi</option>
          <option value="en">English</option>
        </select>
      </div>

      <div class="output-box">
        <strong>Translated Text:</strong>
        <p id="outputText">Your result will appear here...</p>
      </div>

      <audio id="audioPlayer" controls></audio>

      <div class="status" id="status">Idle</div>
    </div>

    <script>
      let mediaRecorder;
      let audioChunks = [];
      let isRecording = false;

      function swapLang() {
        const inLang = document.getElementById("inputLang");
        const outLang = document.getElementById("outputLang");
        [inLang.value, outLang.value] = [outLang.value, inLang.value];
      }

      async function toggleRecording() {
        if (!isRecording) {
          startRecording();
        } else {
          stopRecording();
        }
      }

      async function startRecording() {
        isRecording = true;
        document.getElementById("mic").classList.add("recording");
        document.getElementById("wave").style.display = "flex";
        document.getElementById("status").innerText = "Recording...";

        const stream = await navigator.mediaDevices.getUserMedia({
          audio: true,
        });
        mediaRecorder = new MediaRecorder(stream);
        audioChunks = [];

        mediaRecorder.ondataavailable = (e) => audioChunks.push(e.data);

        mediaRecorder.onstop = async () => {
          document.getElementById("status").innerText = "Processing...";

          const blob = new Blob(audioChunks, { type: "audio/webm" });
          const formData = new FormData();

          formData.append("audio", blob);
          formData.append(
            "input_lang",
            document.getElementById("inputLang").value,
          );
          formData.append(
            "output_lang",
            document.getElementById("outputLang").value,
          );

          try {
            const res = await fetch("http://127.0.0.1:8000/api/translate/", {
              method: "POST",
              body: formData,
            });

            const data = await res.json();

            document.getElementById("outputText").innerText =
              data.translated_text;

            const audioPlayer = document.getElementById("audioPlayer");
            audioPlayer.src = "http://127.0.0.1:8000/" + data.audio_url;
            audioPlayer.play();

            document.getElementById("status").innerText = "Done ✅";
          } catch (err) {
            document.getElementById("status").innerText = "Error ❌";
          }
        };

        mediaRecorder.start();
      }

      function stopRecording() {
        isRecording = false;
        document.getElementById("mic").classList.remove("recording");
        document.getElementById("wave").style.display = "none";
        document.getElementById("status").innerText = "Stopping...";

        if (mediaRecorder) {
          mediaRecorder.stream.getTracks().forEach((track) => track.stop());
          mediaRecorder.stop();
        }
      }
    </script>
  </body>
</html>
